<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>後台管理</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', sans-serif; background: #f0f2f5; color: #1a1a1a; display: flex; height: 100vh; }
button { cursor: pointer; border: none; font-family: inherit; }
input, select, textarea { font-family: inherit; }

.sidebar { width: 220px; background: #1a1a2e; color: #fff; display: flex; flex-direction: column; flex-shrink: 0; }
.sidebar .brand { padding: 24px 20px; font-size: 20px; font-weight: 800; color: #FF6B35; border-bottom: 1px solid rgba(255,255,255,0.1); }
.sidebar .nav { flex: 1; padding: 12px 0; }
.sidebar .nav-item { display: block; width: 100%; padding: 14px 24px; text-align: left; background: none; color: #aaa; font-size: 15px; font-weight: 500; transition: all 0.15s; border-left: 3px solid transparent; }
.sidebar .nav-item:hover { color: #fff; background: rgba(255,255,255,0.05); }
.sidebar .nav-item.active { color: #FF6B35; background: rgba(255,107,53,0.1); border-left-color: #FF6B35; }

.main { flex: 1; overflow-y: auto; padding: 28px 32px; }
.main h2 { font-size: 24px; font-weight: 800; margin-bottom: 24px; color: #1a1a1a; }

.tab-content { display: none; }
.tab-content.active { display: block; }

.card { background: #fff; border-radius: 14px; padding: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); margin-bottom: 20px; }
.card h3 { font-size: 16px; font-weight: 700; margin-bottom: 16px; color: #1a1a1a; }

.table-wrap { overflow-x: auto; }
table { width: 100%; border-collapse: collapse; font-size: 14px; }
table th { text-align: left; padding: 10px 14px; background: #f8f9fa; color: #555; font-weight: 600; border-bottom: 2px solid #eee; white-space: nowrap; }
table td { padding: 10px 14px; border-bottom: 1px solid #f0f0f0; }
table tr:hover td { background: #fafafa; }

.btn { padding: 8px 16px; border-radius: 8px; font-size: 13px; font-weight: 600; transition: all 0.15s; }
.btn-primary { background: #FF6B35; color: #fff; }
.btn-primary:hover { background: #e55a2b; }
.btn-danger { background: #e74c3c; color: #fff; }
.btn-danger:hover { background: #c0392b; }
.btn-secondary { background: #f0f2f5; color: #555; }
.btn-secondary:hover { background: #e0e2e5; }
.btn-sm { padding: 5px 12px; font-size: 12px; }

.form-row { display: flex; gap: 12px; margin-bottom: 12px; align-items: flex-end; flex-wrap: wrap; }
.form-group { display: flex; flex-direction: column; gap: 4px; }
.form-group label { font-size: 12px; font-weight: 600; color: #888; }
.form-group input, .form-group select { padding: 10px 14px; border: 2px solid #e0e0e0; border-radius: 8px; font-size: 14px; outline: none; transition: border-color 0.2s; min-width: 140px; }
.form-group input:focus, .form-group select:focus { border-color: #FF6B35; }

.badge { display: inline-block; padding: 3px 10px; border-radius: 12px; font-size: 12px; font-weight: 600; }
.badge-pending { background: #fff3cd; color: #856404; }
.badge-preparing { background: #cce5ff; color: #004085; }
.badge-done { background: #d4edda; color: #155724; }
.badge-cancelled { background: #f8d7da; color: #721c24; }

.stats-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-bottom: 24px; }
.stat-card { background: #fff; border-radius: 14px; padding: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
.stat-card .stat-label { font-size: 13px; color: #888; font-weight: 600; margin-bottom: 6px; }
.stat-card .stat-value { font-size: 32px; font-weight: 800; color: #FF6B35; }

.inline-flex { display: inline-flex; align-items: center; gap: 6px; }

.toast { position: fixed; top: 24px; left: 50%; transform: translateX(-50%); background: #2ecc71; color: #fff; padding: 14px 28px; border-radius: 10px; font-size: 15px; font-weight: 600; z-index: 200; box-shadow: 0 8px 24px rgba(46,204,113,0.3); animation: slideDown 0.3s; }
.toast.error { background: #e74c3c; box-shadow: 0 8px 24px rgba(231,76,60,0.3); }
@keyframes slideDown { from { opacity: 0; transform: translate(-50%, -20px); } to { opacity: 1; transform: translate(-50%, 0); } }

.sizes-list, .toppings-list { font-size: 12px; color: #888; margin-top: 2px; }
</style>
</head>
<body>
<div class="sidebar">
  <div class="brand">⚙️ 後台管理</div>
  <div class="nav">
    <button class="nav-item active" data-tab="menu">📋 菜單管理</button>
    <button class="nav-item" data-tab="orders">📦 訂單管理</button>
    <button class="nav-item" data-tab="reports">📊 報表</button>
    <button class="nav-item" data-tab="settings">⚙️ 設定</button>
  </div>
</div>
<div class="main" id="main">
  <div class="tab-content active" id="tab-menu"></div>
  <div class="tab-content" id="tab-orders"></div>
  <div class="tab-content" id="tab-reports"></div>
  <div class="tab-content" id="tab-settings"></div>
</div>

<script>
const API = '/api';
let menu = { categories: [], itemsByCat: {} };
let orders = [];
let settings = {};

// Navigation
document.querySelectorAll('.nav-item').forEach(b => b.addEventListener('click', () => {
  document.querySelectorAll('.nav-item').forEach(x => x.classList.remove('active'));
  b.classList.add('active');
  document.querySelectorAll('.tab-content').forEach(x => x.classList.remove('active'));
  const tabId = 'tab-' + b.dataset.tab;
  document.getElementById(tabId).classList.add('active');
  if (b.dataset.tab === 'menu') renderMenuTab();
  if (b.dataset.tab === 'orders') renderOrdersTab();
  if (b.dataset.tab === 'reports') renderReportsTab();
  if (b.dataset.tab === 'settings') renderSettingsTab();
}));

// === MENU TAB ===
async function renderMenuTab() {
  const el = document.getElementById('tab-menu');
  el.innerHTML = '<p style="color:#888;">載入中...</p>';
  const res = await fetch(API + '/menu');
  menu.categories = await res.json();
  menu.itemsByCat = {};
  for (const cat of menu.categories) menu.itemsByCat[cat.id] = cat.items;

  let html = '<h2>📋 菜單管理</h2>';

  // Add category
  html += `<div class="card"><h3>新增分類</h3>
    <div class="form-row">
      <div class="form-group"><label>分類名稱</label><input id="newCatName" placeholder="例如：主食"></div>
      <div class="form-group"><label>排序</label><input id="newCatSort" type="number" value="0" style="width:80px;"></div>
      <button class="btn btn-primary" onclick="addCategory()" style="align-self:flex-end;">新增分類</button>
    </div></div>`;

  // Add item
  html += `<div class="card"><h3>新增商品</h3>
    <div class="form-row">
      <div class="form-group"><label>分類</label><select id="newItemCat">${menu.categories.map(c => `<option value="${c.id}">${c.name}</option>`).join('')}</select></div>
      <div class="form-group"><label>商品名稱</label><input id="newItemName" placeholder="例如：牛肉麵"></div>
      <div class="form-group"><label>價格</label><input id="newItemPrice" type="number" placeholder="150"></div>
      <div class="form-group"><label>Emoji</label><input id="newItemEmoji" placeholder="🍜" style="width:80px;"></div>
      <button class="btn btn-primary" onclick="addItem()" style="align-self:flex-end;">新增商品</button>
    </div></div>`;

  // Categories & items
  for (const cat of menu.categories) {
    html += `<div class="card"><h3>${cat.name} <button class="btn btn-danger btn-sm" onclick="deleteCategory(${cat.id})">刪除分類</button></h3>`;
    html += `<table><thead><tr><th>名稱</th><th>價格</th><th>Emoji</th><th>規格</th><th>加料</th><th>操作</th></tr></thead><tbody>`;

    for (const item of (cat.items || [])) {
      const sizesStr = (item.sizes || []).map(s => s.name + (s.price_adjust ? ` (+${s.price_adjust})` : '')).join(', ') || '—';
      const toppingsStr = (item.toppings || []).map(t => t.name + (t.price_adjust ? ` (+${t.price_adjust})` : '')).join(', ') || '—';
      html += `<tr>
        <td><strong>${item.emoji || ''} ${item.name}</strong></td>
        <td>NT$${item.base_price}</td>
        <td>${item.emoji || '—'}</td>
        <td class="sizes-list">${sizesStr}<br><button class="btn btn-primary btn-sm" onclick="addSize(${item.id})" style="margin-top:4px;">+規格</button></td>
        <td class="toppings-list">${toppingsStr}<br><button class="btn btn-primary btn-sm" onclick="addTopping(${item.id})" style="margin-top:4px;">+加料</button></td>
        <td><button class="btn btn-danger btn-sm" onclick="deleteItem(${item.id})">刪除</button></td>
      </tr>`;
    }
    html += '</tbody></table></div>';
  }

  el.innerHTML = html;
}

async function addCategory() {
  const name = document.getElementById('newCatName').value.trim();
  const sort = Number(document.getElementById('newCatSort').value) || 0;
  if (!name) return showToast('請輸入分類名稱', true);
  await fetch(API + '/categories', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ name, sort_order: sort }) });
  showToast('分類已新增');
  renderMenuTab();
}

async function deleteCategory(id) {
  if (!confirm('確定刪除此分類及所有商品？')) return;
  await fetch(API + '/categories/' + id, { method: 'DELETE' });
  showToast('分類已刪除');
  renderMenuTab();
}

async function addItem() {
  const catId = Number(document.getElementById('newItemCat').value);
  const name = document.getElementById('newItemName').value.trim();
  const price = Number(document.getElementById('newItemPrice').value);
  const emoji = document.getElementById('newItemEmoji').value.trim();
  if (!name || !price) return showToast('請填寫名稱和價格', true);
  await fetch(API + '/items', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ category_id: catId, name, base_price: price, emoji }) });
  showToast('商品已新增');
  renderMenuTab();
}

async function deleteItem(id) {
  if (!confirm('確定刪除此商品？')) return;
  await fetch(API + '/items/' + id, { method: 'DELETE' });
  showToast('商品已刪除');
  renderMenuTab();
}

async function addSize(itemId) {
  const name = prompt('規格名稱（例如：大碗）');
  if (!name) return;
  const adjust = Number(prompt('加價金額（0 或數字）', '0')) || 0;
  await fetch(API + '/items/' + itemId + '/sizes', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ name, price_adjust: adjust }) });
  showToast('規格已新增');
  renderMenuTab();
}

async function addTopping(itemId) {
  const name = prompt('加料名稱（例如：加蛋）');
  if (!name) return;
  const adjust = Number(prompt('加價金額（0 或數字）', '0')) || 0;
  await fetch(API + '/items/' + itemId + '/toppings', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ name, price_adjust: adjust }) });
  showToast('加料已新增');
  renderMenuTab();
}

// === ORDERS TAB ===
async function renderOrdersTab() {
  const el = document.getElementById('tab-orders');
  el.innerHTML = '<p style="color:#888;">載入中...</p>';

  const today = new Date().toISOString().slice(0, 10);
  const res = await fetch(API + '/orders?date=' + today);
  orders = await res.json();

  let html = `<h2>📦 訂單管理</h2>
  <div class="card">
    <div class="form-row">
      <div class="form-group"><label>日期</label><input type="date" id="orderFilterDate" value="${today}" onchange="filterOrders()"></div>
      <div class="form-group"><label>狀態</label><select id="orderFilterStatus" onchange="filterOrders()"><option value="">全部</option><option value="pending">待處理</option><option value="preparing">製作中</option><option value="done">已完成</option><option value="cancelled">已取消</option></select></div>
    </div>
  </div>`;

  html += '<div class="card"><div class="table-wrap"><table id="ordersTable"></table></div></div>';
  el.innerHTML = html;
  renderOrdersTable();
}

function renderOrdersTable(data) {
  const list = data || orders;
  const table = document.getElementById('ordersTable');
  if (!table) return;
  if (list.length === 0) {
    table.innerHTML = '<tr><td colspan="7" style="text-align:center;color:#888;padding:32px;">尚無訂單</td></tr>';
    return;
  }
  const badges = { pending: 'badge-pending', preparing: 'badge-preparing', done: 'badge-done', cancelled: 'badge-cancelled' };
  const statusText = { pending: '待處理', preparing: '製作中', done: '已完成', cancelled: '已取消' };

  table.innerHTML = `<thead><tr><th>單號</th><th>狀態</th><th>商品</th><th>金額</th><th>桌號</th><th>時間</th><th>操作</th></tr></thead><tbody>
  ${list.map(o => `
    <tr>
      <td><strong>#${o.order_number}</strong></td>
      <td><span class="badge ${badges[o.status] || ''}">${statusText[o.status] || o.status}</span></td>
      <td>${(o.items || []).map(i => `${i.quantity}x ${i.item_name}`).join('<br>')}</td>
      <td>NT$${o.total_price}</td>
      <td>${o.table_number || '—'}</td>
      <td>${new Date(o.created_at + 'Z').toLocaleString('zh-TW')}</td>
      <td>
        <select onchange="updateOrderStatus(${o.id}, this.value)" style="padding:4px 8px;border-radius:6px;border:1px solid #ddd;font-size:12px;">
          <option value="">變更狀態</option>
          <option value="pending">待處理</option>
          <option value="preparing">製作中</option>
          <option value="done">已完成</option>
          <option value="cancelled">已取消</option>
        </select>
      </td>
    </tr>`).join('')}</tbody>`;
}

async function filterOrders() {
  const date = document.getElementById('orderFilterDate').value;
  const status = document.getElementById('orderFilterStatus').value;
  let url = API + '/orders?date=' + date;
  if (status) url += '&status=' + status;
  const res = await fetch(url);
  orders = await res.json();
  renderOrdersTable();
}

async function updateOrderStatus(id, status) {
  if (!status) return;
  await fetch(API + '/orders/' + id + '/status', { method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ status }) });
  showToast('狀態已更新');
  filterOrders();
}

// === REPORTS TAB ===
async function renderReportsTab() {
  const el = document.getElementById('tab-reports');
  const today = new Date().toISOString().slice(0, 10);
  const now = new Date();
  el.innerHTML = `<h2>📊 報表</h2>
  <div class="card"><h3>今日營業報表</h3><div class="form-row">
    <div class="form-group"><label>日期</label><input type="date" id="dailyDate" value="${today}"></div>
    <button class="btn btn-primary" onclick="loadDailyReport()" style="align-self:flex-end;">查詢</button>
    <button class="btn btn-secondary" onclick="exportCSV()" style="align-self:flex-end;">匯出 CSV</button>
  </div><div id="dailyReport"></div></div>
  <div class="card"><h3>月度營業報表</h3><div class="form-row">
    <div class="form-group"><label>年</label><input id="monthlyYear" type="number" value="${now.getFullYear()}" style="width:100px;"></div>
    <div class="form-group"><label>月</label><input id="monthlyMonth" type="number" value="${now.getMonth()+1}" style="width:80px;" min="1" max="12"></div>
    <button class="btn btn-primary" onclick="loadMonthlyReport()" style="align-self:flex-end;">查詢</button>
  </div><div id="monthlyReport"></div></div>`;
  loadDailyReport();
}

async function loadDailyReport() {
  const date = document.getElementById('dailyDate').value;
  const res = await fetch(API + '/reports/daily?date=' + date);
  const data = await res.json();
  let html = '<div class="stats-row">';
  html += `<div class="stat-card"><div class="stat-label">訂單數</div><div class="stat-value">${data.total_orders}</div></div>`;
  html += `<div class="stat-card"><div class="stat-label">營業額</div><div class="stat-value">NT$${data.total_revenue}</div></div>`;
  html += `<div class="stat-card"><div class="stat-label">平均客單價</div><div class="stat-value">NT$${data.average_order_value}</div></div>`;
  html += '</div>';

  if (data.item_breakdown && data.item_breakdown.length > 0) {
    html += '<table><thead><tr><th>商品</th><th>數量</th><th>營業額</th></tr></thead><tbody>';
    for (const i of data.item_breakdown) html += `<tr><td>${i.item_name}</td><td>${i.count}</td><td>NT$${i.revenue}</td></tr>`;
    html += '</tbody></table>';
  }
  document.getElementById('dailyReport').innerHTML = html;
}

async function loadMonthlyReport() {
  const year = document.getElementById('monthlyYear').value;
  const month = document.getElementById('monthlyMonth').value;
  const res = await fetch(API + '/reports/monthly?year=' + year + '&month=' + month);
  const data = await res.json();

  let html = '<div class="stats-row">';
  html += `<div class="stat-card"><div class="stat-label">總訂單數</div><div class="stat-value">${data.total_orders}</div></div>`;
  html += `<div class="stat-card"><div class="stat-label">總營業額</div><div class="stat-value">NT$${data.total_revenue}</div></div>`;
  html += '</div>';

  if (data.daily_totals && data.daily_totals.length > 0) {
    html += '<h4 style="margin:12px 0 8px;">每日明細</h4><table><thead><tr><th>日期</th><th>訂單數</th><th>營業額</th></tr></thead><tbody>';
    for (const d of data.daily_totals) html += `<tr><td>${d.date}</td><td>${d.orders}</td><td>NT$${d.revenue}</td></tr>`;
    html += '</tbody></table>';
  }

  if (data.top_items && data.top_items.length > 0) {
    html += '<h4 style="margin:16px 0 8px;">熱門商品 TOP 10</h4><table><thead><tr><th>商品</th><th>數量</th><th>營業額</th></tr></thead><tbody>';
    for (const i of data.top_items) html += `<tr><td>${i.item_name}</td><td>${i.count}</td><td>NT$${i.revenue}</td></tr>`;
    html += '</tbody></table>';
  }

  document.getElementById('monthlyReport').innerHTML = html;
}

function exportCSV() {
  const date = document.getElementById('dailyDate').value;
  window.open(API + '/reports/export?type=daily&date=' + date, '_blank');
}

// === SETTINGS TAB ===
async function renderSettingsTab() {
  const el = document.getElementById('tab-settings');
  el.innerHTML = '<p style="color:#888;">載入中...</p>';
  const res = await fetch(API + '/settings');
  settings = await res.json();

  el.innerHTML = `<h2>⚙️ 系統設定</h2>
  <div class="card">
    <h3>基本設定</h3>
    <div class="form-row">
      <div class="form-group"><label>店名</label><input id="setStoreName" value="${settings.store_name || ''}"></div>
    </div>
    <button class="btn btn-primary" onclick="saveSettings()">儲存設定</button>
  </div>
  <div class="card">
    <h3>目前狀態</h3>
    <table>
      <tr><td>目前訂單編號計數</td><td><strong>${settings.current_order_number || '0'}</strong></td></tr>
      <tr><td>目前叫號號碼</td><td><strong>${settings.current_calling_number || '1'}</strong></td></tr>
      <tr><td>上次重置日期</td><td>${settings.last_reset_date || '—'}</td></tr>
    </table>
  </div>

  <div class="card">
    <h3>印表機設定</h3>
    <p style="color:#888;font-size:13px;">印表機功能需配合 node-thermal-printer。設定儲存於本機配置中。</p>
    <div class="form-row" style="margin-top:12px;">
      <div class="form-group"><label>印表機介面</label><input id="setPrinterInterface" value="${settings.printer_interface || 'tcp'}" placeholder="tcp / usb"></div>
      <div class="form-group"><label>印表機 IP</label><input id="setPrinterIp" value="${settings.printer_ip || ''}" placeholder="192.168.x.x"></div>
    </div>
    <button class="btn btn-primary" onclick="savePrinterSettings()">儲存印表機設定</button>
  </div>`;
}

async function saveSettings() {
  const storeName = document.getElementById('setStoreName').value.trim();
  await fetch(API + '/settings', { method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ store_name: storeName }) });
  showToast('設定已儲存');
}

async function savePrinterSettings() {
  const iface = document.getElementById('setPrinterInterface').value.trim();
  const ip = document.getElementById('setPrinterIp').value.trim();
  await fetch(API + '/settings', { method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ printer_interface: iface, printer_ip: ip }) });
  showToast('印表機設定已儲存');
}

// === HELPERS ===
function showToast(msg, isError) {
  const t = document.createElement('div');
  t.className = 'toast' + (isError ? ' error' : '');
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => { t.style.opacity = '0'; t.style.transition = 'opacity 0.3s'; setTimeout(() => t.remove(), 300); }, 2500);
}

// Init
renderMenuTab();
</script>
</body>
</html>
